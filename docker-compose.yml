services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ecotwin
      POSTGRES_PASSWORD: ecotwin
      POSTGRES_DB: ecotwin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://ecotwin:ecotwin@db:5432/ecotwin
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      - db

  dashboard:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE: http://localhost:8000/api
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
